<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Pipeline Demo | Team Axiom</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0d1117;
            color: #fff;
            font-family: Segoe UI, Tahoma, sans-serif;
        }

        .hero {
            background: linear-gradient(135deg, #161b22, #0d1117);
            padding: 60px 20px;
            text-align: center;
        }

        .card-dark {
            background: #161b22;
            border: 1px solid #30363d;
            color: white;
        }

        .pipeline {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 40px;
        }

        .step {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 15px;
            border-radius: 10px;
            min-width: 120px;
            text-align: center;
            transition: .4s;
        }

        .step.active {
            background: #238636;
            transform: scale(1.08);
            box-shadow: 0 0 20px #238636;
        }

        .arrow {
            font-size: 28px;
            color: #58a6ff;
        }

        .logs {
            background: #000;
            color: #00ff7f;
            padding: 15px;
            border-radius: 10px;
            height: 220px;
            overflow: auto;
            font-family: monospace;
        }

        .footer {
            text-align: center;
            color: #aaa;
            padding: 30px;
        }

        .btn-demo {
            margin: 5px;
        }

        .badge-live {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: .3;
            }
        }
    </style>

</head>

<body>

    <div class="hero">

        <h1 class="display-5 fw-bold">
            🚀 CI/CD Pipeline Decoded
        </h1>

        <p class="lead">
            From Code Commit to Production
        </p>

        <span class="badge bg-danger badge-live">
            LIVE DEMO
        </span>

        <br><br>

        <button class="btn btn-success btn-demo" onclick="startPipeline()">
            ▶ Start Pipeline
        </button>

        <button class="btn btn-warning btn-demo" onclick="simulateFail()">
            ❌ Fail Build
        </button>

        <button class="btn btn-info btn-demo" onclick="location.reload()">
            🔄 Reset
        </button>

    </div>

    <div class="container mt-5">

        <div class="row g-4">

            <div class="col-md-3">
                <div class="card card-dark p-3">
                    <h5>Repository</h5>
                    <h6>axiomtechguru/cicd-demo</h6>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card card-dark p-3">
                    <h5>Branch</h5>
                    <h6>main</h6>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card card-dark p-3">
                    <h5>Status</h5>
                    <h6 id="status">Waiting...</h6>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card card-dark p-3">
                    <h5>Environment</h5>
                    <h6>Production</h6>
                </div>
            </div>

        </div>

        <div class="pipeline">

            <div class="step">Git Commit</div>
            <div class="arrow">➡</div>

            <div class="step">Git Push</div>
            <div class="arrow">➡</div>

            <div class="step">GitHub Actions</div>
            <div class="arrow">➡</div>

            <div class="step">Build</div>
            <div class="arrow">➡</div>

            <div class="step">Test</div>
            <div class="arrow">➡</div>

            <div class="step">Deploy</div>
            <div class="arrow">➡</div>

            <div class="step">Production</div>

        </div>

        <div class="mt-5">

            <div class="card card-dark">

                <div class="card-header">
                    Live Deployment Logs
                </div>

                <div class="card-body">

                    <div class="logs" id="logs">

                        Ready...

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">

        Made with ❤️ by Team Axiom

    </div>

    <script>

        const steps = document.querySelectorAll(".step");

        const logs = document.getElementById("logs");

        const status = document.getElementById("status");

        function log(msg) {

            logs.innerHTML += msg + "<br>";

            logs.scrollTop = logs.scrollHeight;

        }

        function clearAll() {

            steps.forEach(s => s.classList.remove("active"));

            logs.innerHTML = "";

        }

        function startPipeline() {

            clearAll();

            status.innerHTML = "Running...";

            const messages = [
                "Git Commit received...",
                "Pushing to GitHub...",
                "GitHub Actions Triggered...",
                "Installing Dependencies...",
                "Running Tests...",
                "Deploying to VPS...",
                "Restarting PM2...",
                "Deployment Successful 🚀"
            ];

            steps.forEach((step, index) => {

                setTimeout(() => {

                    step.classList.add("active");

                    log(messages[index]);

                    if (index == steps.length - 1) {

                        status.innerHTML = "<span class='text-success'>SUCCESS</span>";

                    }

                }, index * 1200);

            });

        }

        function simulateFail() {

            clearAll();

            status.innerHTML = "<span class='text-danger'>FAILED</span>";

            steps[0].classList.add("active");

            steps[1].classList.add("active");

            steps[2].classList.add("active");

            steps[3].classList.add("active");

            log("Git Commit received...");

            log("GitHub Actions Triggered...");

            log("Installing Packages...");

            log("<span style='color:red'>Build Failed ❌</span>");

            log("<span style='color:red'>Missing Environment Variable</span>");

        }

    </script>

</body>

</html>
